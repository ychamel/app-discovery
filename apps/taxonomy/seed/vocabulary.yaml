# Authoritative founding vocabulary for the interest taxonomy (DESIGN.md §6, T-09).
#
# This file is the human-editable source for the curated tag set. `manage.py
# seed_taxonomy` applies it idempotently (upsert by slug) through the write service.
#
# Structure:
#   clusters:                       # named groupings (every active tag joins ≥1)
#     - slug: <immutable-key>       # required, unique, never renamed
#       name: <display name>        # required, renameable
#       description: <optional>
#   tags:
#     - slug: <immutable-key>       # required, unique; the human key (NOT the stored ref)
#       label: <display label>      # required, renameable; unique (case/space-insensitive)
#       definition: <optional>      # short meaning where not self-evident
#       clusters: [<cluster-slug>]  # required, ≥1
#       retired: true               # optional; retires the tag (kept, never deleted)
#       replaced_by: <tag-slug>     # optional successor when retired into another tag
#
# Niche: "vibecoded webapps" — small web apps from solo/tiny-team devs, often AI-assisted
# (D-1). Tags describe an app's subject matter and a user's interests in one shared
# language. Size band: see OQ-3 in features/interest-taxonomy/DECISIONS.md (ITX-12).

clusters:
  - slug: productivity
    name: Productivity & Organization
    description: Tools for planning, tracking, and getting work and personal tasks done.
  - slug: developer-tools
    name: Developer Tools
    description: Apps that help people build, ship, and operate software.
  - slug: ai-ml
    name: AI & Machine Learning
    description: Apps whose core value is an AI/ML capability.
  - slug: content-creativity
    name: Content & Creativity
    description: Writing, publishing, design, and media creation.
  - slug: finance
    name: Finance & Money
    description: Personal and small-business money management.
  - slug: health-wellness
    name: Health & Wellness
    description: Physical and mental wellbeing.
  - slug: education
    name: Education & Learning
    description: Teaching, studying, and skill-building.
  - slug: social-community
    name: Social & Community
    description: Connecting people and running communities.
  - slug: commerce
    name: Commerce & Marketplace
    description: Selling, booking, and transacting.
  - slug: data-analytics
    name: Data & Analytics
    description: Collecting, visualizing, and making sense of data.
  - slug: lifestyle-entertainment
    name: Lifestyle & Entertainment
    description: Everyday life, hobbies, leisure, and games.

