<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Developer updates · App Discovery{% endblock %}</title>
  {% block head %}{% endblock %}
</head>
<body>
  <main>
    {% if messages %}
      <ul aria-label="Messages">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
